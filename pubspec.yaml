name: flutter_cleanapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^19.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "icon_limpy.png"
  web:
    generate: true
    image_path: "icon_limpy.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "icon_limpy.png"
    icon_size: 48
  image_path: "icon_limpy.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env.local
